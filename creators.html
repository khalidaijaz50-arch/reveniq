<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RevenIQ — Creator Roster Access</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #f0f5ff, #e8f0ff);
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,102,255,0.12);
    text-align: center;
    border-top: 4px solid #0066FF;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #0a0a0a; margin-bottom: 20px; }
  .logo em { color: #0066FF; font-style: normal; }
  .icon { font-size: 48px; display: block; margin-bottom: 16px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #0a0a0a; margin-bottom: 8px; }
  p { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 28px; }
  input[type="password"] {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    text-align: center;
    letter-spacing: 0.2em;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    margin-bottom: 12px;
    font-family: 'DM Sans', sans-serif;
    color: #0a0a0a;
    background: #f8f9fc;
    outline: none;
    -webkit-appearance: none;
    display: block;
  }
  input[type="password"]:focus { border-color: #0066FF; }
  input[type="submit"] {
    width: 100%;
    padding: 15px;
    background: #0066FF;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-appearance: none;
    display: block;
  }
  input[type="submit"]:active { background: #0047cc; }
  .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
  .success { color: #16a34a; font-size: 13px; margin-top: 12px; display: none; }
  .footer { margin-top: 24px; font-size: 12px; color: #9ca3af; }
  .footer a { color: #0066FF; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Reven<em>IQ</em></div>
  <span class="icon">🔐</span>
  <h1>Creator Roster Access</h1>
  <p>Enter the access code shared by our team to view our exclusive creator network.</p>
  <form id="f" action="/roster.html" method="get" onsubmit="return go(event)">
    <input type="password" id="pwd" placeholder="Enter access code" autocomplete="off" />
    <input type="submit" value="Access Roster →" />
    <div class="error" id="err">❌ Wrong code. Contact partnership@reveniq.co</div>
    <div class="success" id="ok">✅ Correct! Opening roster...</div>
  </form>
  <div class="footer">No code? <a href="mailto:partnership@reveniq.co">Contact us</a> · <a href="/">reveniq.co</a></div>
</div>
<script>
function go(e) {
  e.preventDefault();
  var pwd = document.getElementById('pwd').value.trim();
  if (pwd === 'reveniq2025') {
    document.getElementById('err').style.display = 'none';
    document.getElementById('ok').style.display = 'block';
    document.querySelector('input[type=submit]').value = 'Opening...';
    // Small delay then redirect — iOS Safari requires user-initiated navigation
    setTimeout(function() {
      window.location.href = '/roster.html';
    }, 300);
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
  }
  return false;
}
</script>
</body>
</html>
